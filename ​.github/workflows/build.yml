name: Build Pure GKI Kernel 5.10.218

on:
  workflow_dispatch:
    inputs:
      manifest_branch:
        description: '谷歌 GKI 分支 (请保持默认以精准匹配 5.10.218)'
        required: true
        default: 'android12-5.10-2024-08'

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: 清理磁盘空间 
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: 安装依赖工具
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl git python3 rsync zip
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+rx ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: 初始化并同步谷歌 GKI 源码
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          repo init -u https://android.googlesource.com/kernel/manifest -b ${{ github.event.inputs.manifest_branch }} --depth=1
          repo sync -j$(nproc) --no-clone-bundle --no-tags

      - name: 注入用户指定的内核配置
        run: |
          cd kernel_workspace/common
          cat <<EOF >> arch/arm64/configs/gki_defconfig
          CONFIG_BPF_STREAM_PARSER=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          EOF

      - name: 编译内核
        run: |
          cd kernel_workspace
          LTO=thin tools/bazel build //common:kernel_aarch64 --verbose_failures

      - name: 打包 AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          rm -rf AnyKernel3/.git
          cp kernel_workspace/bazel-bin/common/kernel_aarch64/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=Pure GKI 5.10.218 with ipset (No Root)/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/block=.*/block=boot;/' anykernel.sh
          zip -r9 ../AnyKernel3-GKI-5.10.218.zip *

      - name: 提取并上传产物
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3-GKI-5.10.218-NoRoot
          path: AnyKernel3-GKI-5.10.218.zip

